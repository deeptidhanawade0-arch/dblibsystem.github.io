<!DOCTYPE html>
<html>
<head>
  <title>Admin Registration</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<header>
<div class="logo">
  <img src="logo.jpeg">
    </div>
      <nav>
        <ul>
          <li><a href="index.html">HOME</a></li>
          <li><a href="student_login.html">STUDENT-LOGIN</a></li>
          <li><a href="admin_login.html">ADMIN_LOGIN</a></li>
		  <li><a href="Feedback_form.html">FEEDBACK</a></li>
        </ul>
      </nav>
</header>
<section>
    <br>
    <div class="box1">
      <h1 style="text-align: center; font-size: 20px; font-family: lucid console;">Library Management System</h1><br>
      <h1 style="text-align: center; font-size: 20px;"> Admin Registartion Form</h1><br>
      <form name="login" action="" onsubmit="return validate(event);">
        <br>
        <div class="login">
      <input type="text" id="username" placeholder="USERNAME" required=""><br><br>
      <input type="email" id="email" placeholder="EMAIL" required=""><br><br>
      <input type="password" id="password" placeholder="PASSWORD" required=""><br><br>
      <input type="password" id="confirm_password" placeholder="CONFIRM PASSWORD" required=""><br><br>
      <button> Sign Up </button>
      </div>
      </form>
	</div>
</section>
<script>
	function validate() {
		event.preventDefault();
		
		let email = document.getElementById("email").value;
		let pass = document.getElementById("password").value;
		let c_pass = document.getElementById("confirm_password").value;
		let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
		
		if(!emailPattern.test(email))
		{  alert("Please enter a valid email address!");
		   return false;
		}
		
		if(pass.length !== 6)
		{  alert("Password must be 6 characters long!");
		   return false;
		}
		
		if(pass !== c_pass)
		{  alert("Password must match with confirm password!");
		   return false;
		}
    window.location.href = "admin_login.html";
		return true;
	}
</script>
</body>
</html>
