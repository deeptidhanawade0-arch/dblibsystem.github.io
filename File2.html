<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      transition: all 0.3s;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #1b366b;
      color: white;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      padding-top: 20px;
      transition: width 0.4s ease;
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 70px;
    }

    .sidebar h2, .sidebar p {
      margin: 5px 0;
      transition: opacity 0.4s ease;
    }

    .sidebar.collapsed h2, .sidebar.collapsed p {
      opacity: 0;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      color: white;
      text-decoration: none;
      transition: background 0.3s, padding 0.4s;
      font-size: 14px;
    }

    .sidebar a i {
      margin-right: 10px;
      min-width: 20px;
      text-align: center;
      font-size: 18px;
      transition: transform 0.3s;
    }

    .sidebar a:hover {
      background: #34495e;
    }

    .sidebar a.active {
      background: #16a085;
    }

    /* Toggle Button */
    .toggle-btn {
      position: absolute;
      top: 20px;
      right: -20px;
      background: #16a085;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      color: white;
      font-size: 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }

    .toggle-btn:hover {
      transform: rotate(180deg);
    }

    /* Main Content */
    .main-content {
      margin-left: 240px;
      padding: 20px;
      flex: 1;
      min-height: 100vh;
      transition: margin-left 0.4s ease;
      background: url("image1.jpeg") no-repeat center center fixed;
      background-size: cover;
	  opacity: 0.75;
    }

    .sidebar.collapsed ~ .main-content {
      margin-left: 70px;
    }


    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1b366b;
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .logout-btn {
      background: #e74c3c;
      border: none;
      color: white;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: #c0392b;
    }

	.section {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 800px;
      text-align: center;
    }
	
    /* Dashboard Cards */
    .dashboard-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
	}
	
    .card {
      flex: 1 1 200px;
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.3s;
      cursor: pointer;
	  align-items: center;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin: 0 0 10px;
      color: #2c3e50;
    }

    .card p {
      font-size: 24px;
      margin: 0;
      font-weight: bold;
      color: #16a085;
    }

    /* Reports Table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

	.active {
      background: #16a085 !important;
      font-weight: bold;
    }
	
    table th, table td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    table th {
      background: #2c3e50;
      color: white;
    }

    table tr:hover {
      background: #f1f1f1;
	  padding-left: 30px;
    }

    .status-badge {
      padding: 5px 10px;
      border-radius: 12px;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .completed {
      background: #16a085;
    }

    .pending {
      background: #f39c12;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 70px;
      }
      .sidebar h2, .sidebar p {
        display: none;
      }
      .main-content {
        margin-left: 70px;
      }
      .dashboard-cards {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
  	<h4><i class="fas fa-user"></i> Admin Dashboard</h4>
	<a href="index.html"><i class="fa-solid fa-home"></i><span class="link-text">Home</span></a>
    <a href="File2.html"><i class="fa-solid fa-dashboard"></i><span class="link-text">Dashboard</span></a>
    <a href="add_books.html"><i class="fas fa-book-medical"></i><span class="link-text">Add Books</span></a>
    <a href="manage_books.html"><i class="fas fa-book"></i><span class="link-text">Manage Books</span></a>
    <a href="add_members.html"><i class="fas fa-user-plus"></i><span class="link-text">Add Members</span></a>
    <a href="manage_members.html"><i class="fas fa-users"></i><span class="link-text">Manage Members</span></a>
    <a href="readers_list.html"><i class="fas fa-user"></i><span class="link-text">Reader's List</span></a>
    <a href="search_bar.html"><i class="fas fa-search"></i><span class="link-text">Search Books</span></a>
    <a href="reports.html"><i class="fas fa-chart-line"></i><span class="link-text">Reports</span></a>
    <a href="about_us.html"><i class="fas fa-info-circle"></i><span class="link-text">About Us</span></a>
    <div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-angle-left"></i></div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="top-bar">
      <h2>Admin Dashboard</h2>
      <button class="logout-btn" onclick="confirmLogout()">Logout</button>
    </div>

    <!-- Dashboard Cards -->
    <div class="dashboard-cards">
      <div class="card">
        <h3>Total Books</h3>
        <p>1,250</p>
      </div>
      <div class="card">
        <h3>Issued Books</h3>
        <p>450</p>
      </div>
      <div class="card">
        <h3>Total Members</h3>
        <p>320</p>
      </div>
      <div class="card">
        <h3>Reports Today</h3>
        <p>3</p>
      </div>
    </div> <br> <br> <br>
	<section>
	<div class="content" id="content-area">
      <div class="card">
	  
        <h2><i class="fa-solid fa-book-open-reader"></i> Welcome to Land of Books</h2>
        <p>"Where every page opens a new world"</p>
      </div>
    </div>
	</section>
    <!-- Reports Table -->
    
  </div>

  <script>
    function confirmLogout() {
      if (confirm("Are you sure you want to logout?")) {
        window.location.href = "index.html";
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("collapsed");
      const icon = sidebar.querySelector(".toggle-btn i");
      icon.classList.toggle("fa-angle-left");
      icon.classList.toggle("fa-angle-right");
    }
	
  </script>

</body>
</html>
