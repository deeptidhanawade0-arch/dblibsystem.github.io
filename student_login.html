<script>
function validate(event) {
	event.preventDefault();
	
    let pass = document.getElementById("password").value;

    if (pass.length !== 6) {
      alert("Password must be 6 characters long!");
      return false;
    }
    window.location.href = "File1.html";
    return true;
  }
</script>
