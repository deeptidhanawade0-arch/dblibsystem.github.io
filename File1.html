<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Dashboard</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  /*student_dashbord*/

	body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("C:/Users/Deepti/OneDrive/Documents/Deepti/Project/image1.jpeg")no-repeat center center/cover;
      opacity: 0.75;
      z-index: -1;
    }
	
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }
	
    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #1b366b;
      color: white;
      display: flex;
      flex-direction: column;
      transition: width 0.3s;
    }

    .sidebar.collapsed ~ .main-content {
      margin-left: 70px;
    }

    .sidebar h2 {
      text-align: center;
      padding: 20px 0;
      margin: 0;
      background: #1b366b;
    }

    .sidebar a {
      padding: 15px 20px;
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.3s, padding-left 0.3s;
    }

    .sidebar a:hover {
      background: #2c3e50;
      padding-left: 30px;
    }

    /* Active link */
    .sidebar a.active {
      background: #16a085 !important;
      font-weight: bold;
    }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #1b366b;
      color: white;
      padding: 15px 20px;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: center;
	  text-align
    }

	
    /* Responsive Sidebar */
    .toggle-btn {
      position: absolute;
      top: 20px;
      right: -20px;
      background: #16a085;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      color: white;
      font-size: 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 0;
        overflow: hidden;
      }
	  
      .toggle-btn {
        display: block;
      }
    }

    /* Card */
    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 800px;
      text-align: center;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    table th, table td {
      padding: 12px;
      text-align: left;
    }
    table th {
      background: #34495e;
      color: white;
    }
    table tr:nth-child(even) {
      background: #f2f2f2;
    }

    /* Logout Button */
    .logout-btn {
      background: #e74c3c;
	  align-items: right;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
    }
    .logout-btn:hover {
      background: #c0392b;
    }
	</style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
     <h4><i class="fa-solid fa-user-graduate"></i> Student Dashboard</h4>
  	<div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-angle-left"></i></div>
    <a href="index.html"><i class="fa-solid fa-home"></i><span class="link-text">Home</span></a>
    <a href="File1.html"><i class="fa-solid fa-dashboard"></i><span class="link-text">Dashboard</span></a>
    <a href="search_bar_stud.html"><i class="fas fa-search"></i><span class="link-text">Search Books</span></a>
    <a href="reports_stud.html"  onclick="loadContent('report', this)"><i class="fas fa-file-alt"></i><span class="link-text">Report</span></a>
    <a href="about_us_stud.html"><i class="fas fa-circle-info"></i><span class="link-text">About us</span></a>

  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="header">     
      <button class="logout-btn" onclick="confirmLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
    <div class="content" id="content-area">
      <div class="card">
	  
        <h2><i class="fa-solid fa-book-open-reader"></i> Welcome to Land of Books</h2>
        <p>"Where every page opens a new world"</p>
      </div>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("collapsed");
      const icon = sidebar.querySelector(".toggle-btn i");
      icon.classList.toggle("fa-angle-left");
      icon.classList.toggle("fa-angle-right");
    }

    function confirmLogout() {
      if (confirm("Are you sure you want to logout?")) {
        window.location.href = "index.html";
      }
    }

  </script>

</body>
</html>
