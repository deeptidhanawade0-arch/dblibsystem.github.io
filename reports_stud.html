<html>
<head>
  <title>Reports</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("C:/Users/Deepti/OneDrive/Documents/Deepti/Project/image1.jpeg") no-repeat center center/cover;
      opacity: 0.75;
      z-index: -1;
    }
body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      transition: all 0.3s;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #1b366b;
      color: white;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      padding-top: 20px;
      transition: width 0.4s ease;
      overflow: hidden;
    }

    .sidebar.collapsed {
      width: 70px;
    }

    .sidebar h2, .sidebar p {
      margin: 5px 0;
      transition: opacity 0.4s ease;
    }

    .sidebar.collapsed h2, .sidebar.collapsed p {
      opacity: 0;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      color: white;
      text-decoration: none;
      transition: background 0.3s, padding 0.4s;
      font-size: 14px;
    }

    .sidebar a i {
      margin-right: 10px;
      min-width: 20px;
      text-align: center;
      font-size: 18px;
      transition: transform 0.3s;
    }

    .sidebar a:hover {
      background: #34495e;
	  padding-left: 30px;
    }

    .sidebar a.active {
      background: #16a085;
    }

    /* Toggle Button */
    .toggle-btn {
      position: absolute;
      top: 20px;
      right: -20px;
      background: #16a085;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      color: white;
      font-size: 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }

    .toggle-btn:hover {
      transform: rotate(180deg);
    }

    /* Main Content */
    .main-content {
      margin-left: 240px;
      padding: 20px;
      flex: 1;
      min-height: 100vh;
      transition: margin-left 0.4s ease;
      background: url("image1.jpeg") no-repeat center center fixed;
      background-size: cover;
	  opacity: 0.75;
    }

    .sidebar.collapsed ~ .main-content {
      margin-left: 70px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1b366b;
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .logout-btn {
      background: #e74c3c;
      border: none;
      color: white;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: #c0392b;
    }
	
	.container {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
	  align-item: center;
    }
	
	.section {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 800px;
      text-align: center;
    }
	
    /* Dashboard Cards */
    .dashboard-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
	}
	
    .card {
      flex: 1 1 200px;
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.3s;
      cursor: pointer;
	  align-items: center;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin: 0 0 10px;
      color: #2c3e50;
    }

    .card p {
      font-size: 24px;
      margin: 0;
      font-weight: bold;
      color: #16a085;
    }

    /* Reports Table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

	.active {
      background: #16a085 !important;
      font-weight: bold;
    }
	
    table th, table td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    table th {
      background: #2c3e50;
      color: white;
    }

    table tr:hover {
      background: #f1f1f1;
    }

    .status-badge {
      padding: 5px 10px;
      border-radius: 12px;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .completed {
      background: #16a085;
    }

    .pending {
      background: #f39c12;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 70px;
      }
      .sidebar h2, .sidebar p {
        display: none;
      }
      .main-content {
        margin-left: 70px;
      }
      .dashboard-cards {
        flex-direction: column;
      }
    }
	header {
      background: #1b366b;
      color: white;
      padding: 15px;
      text-align: center;
    }
		</style>
	</head>
<body>  
<header>
<h1><i class="fa-solid fa-file-alt"></i> Reports</h1>
</header>

	<div class="sidebar" id="sidebar">
     <h4><i class="fa-solid fa-user-graduate"></i> Student Dashboard</h4>
  	<div class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-angle-left"></i></div>
    <a href="index.html"><i class="fa-solid fa-home"></i><span class="link-text">Home</span></a>
    <a href="File1.html"><i class="fa-solid fa-dashboard"></i><span class="link-text">Dashboard</span></a>
    <a href="search_bar_stud.html"><i class="fas fa-search"></i><span class="link-text">Search Books</span></a>
    <a href="reports_stud.html"  onclick="loadContent('report', this)"><i class="fas fa-file-alt"></i><span class="link-text">Report</span></a>
    <a href="about_us_stud.html"><i class="fas fa-circle-info"></i><span class="link-text">About us</span></a>
  </div>
	
	<div class="container">
	<div class="card">
<h3><i class="fa-solid fa-file-alt"></i> Reports</h3>
        <p>Here you can view your borrowed and returned books.</p>
            <table>
              <tr>
                <th>Book Title</th>
                <th>Status</th>
                <th>Due Date</th>
              </tr>
              <tr>
                <td>Introduction to C Programming</td>
                <td>Borrowed</td>
                <td>10-Oct-2025</td>
              </tr>
              <tr>
                <td>Data Structures in Java</td>
                <td>Returned</td>
                <td>-</td>
              </tr>
            </table>
        </div>
		</div>
	<script>
	function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("collapsed");
      const icon = sidebar.querySelector(".toggle-btn i");
      icon.classList.toggle("fa-angle-left");
      icon.classList.toggle("fa-angle-right");
    }
	
	</script>
</body>
</html>
